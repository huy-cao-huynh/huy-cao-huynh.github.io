<!doctype html>
<html lang="{{ site.locale | slice: 0, 2 }}">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{ page.title | default: site.title }}</title>
    {% if page.description or site.description %}
      <meta
        name="description"
        content="{{ page.description | default: site.description | strip_html | strip }}"
      />
    {% endif %}

    <link rel="icon" href="{{ '/images/favicon.svg' | relative_url }}" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/css/portfolio.css' | relative_url }}" />
  </head>

  <body>
    <header class="topbar" aria-label="Section navigation">
      <div class="topbar-inner">
        <div class="brand" aria-label="Site title">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">{{ site.author.name | default: site.name }}</span>
        </div>

        <nav class="topnav" aria-label="Quick scroll">
          <a class="topnav-link" href="#biography" data-nav="biography" aria-current="true">Bio</a>
          <a class="topnav-link" href="#projects" data-nav="projects">Projects</a>
          <a class="topnav-link" href="#resume" data-nav="resume">Resume</a>
        </nav>
      </div>

      <div class="topnav-indicator" aria-hidden="true"></div>
    </header>

    <main class="snap-root">{{ content }}</main>

    <div class="project-panel-overlay" id="project-panel-overlay" aria-hidden="true">
      <div class="project-panel" id="project-panel" role="dialog" aria-modal="true" aria-labelledby="project-panel-title">
        <button type="button" class="project-panel-close" id="project-panel-close" aria-label="Close panel">&times;</button>
        <div class="project-panel-inner">
          <div id="project-panel-image-wrap"></div>
          <h2 id="project-panel-title"></h2>
          <p class="project-panel-details" id="project-panel-details"></p>
          <p class="project-panel-tech" id="project-panel-tech"></p>
          <div class="project-panel-actions" id="project-panel-actions"></div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const root = document.querySelector(".snap-root");
        const navLinks = Array.from(document.querySelectorAll("[data-nav]"));
        const sections = Array.from(document.querySelectorAll("[data-section]"));

        if (!root || navLinks.length === 0 || sections.length === 0) return;

        const indicator = document.querySelector(".topnav-indicator");
        const header = document.querySelector(".topbar");

        const setActive = (id) => {
          navLinks.forEach((a) => {
            const isActive = a.dataset.nav === id;
            a.setAttribute("aria-current", isActive ? "true" : "false");
            a.toggleAttribute("data-active", isActive);
          });

          sections.forEach((s) => {
            const isActive = s.getAttribute("data-section") === id;
            s.classList.toggle("is-active", isActive);
          });

          if (indicator) {
            const active = navLinks.find((a) => a.dataset.nav === id);
            const rect = active ? active.getBoundingClientRect() : null;
            const headerRect = header.getBoundingClientRect();
            if (rect) {
              indicator.style.width = rect.width + "px";
              indicator.style.height = rect.height + "px";
              indicator.style.transform =
                "translateX(" + (rect.left - headerRect.left) + "px) translateY(-50%)";
            }
          }
        };

        // Initial indicator placement: set to Bio.
        setActive("biography");

        const io = new IntersectionObserver(
          (entries) => {
            // Pick the section with the highest intersection ratio.
            let best = null;
            for (const e of entries) {
              if (!e.isIntersecting) continue;
              const id = e.target.getAttribute("data-section");
              const ratio = e.intersectionRatio;
              if (!best || ratio > best.ratio) best = { id, ratio };
            }
            if (best) setActive(best.id);
          },
          { root: null, threshold: [0.35, 0.55, 0.75] }
        );

        sections.forEach((s) => io.observe(s));
      })();
    </script>

    <script>
      (function () {
        const overlay = document.getElementById("project-panel-overlay");
        const panel = document.getElementById("project-panel");
        const closeBtn = document.getElementById("project-panel-close");
        const cards = document.querySelectorAll(".project-card[data-project-id]");

        if (!overlay || !panel || cards.length === 0) return;

        const openPanel = (card) => {
          const title = card.dataset.projectTitle;
          const short = card.dataset.projectShort;
          const image = card.dataset.projectImage;
          const github = card.dataset.projectGithub;
          const demo = card.dataset.projectDemo;
          const details = card.dataset.projectDetails;
          const tech = card.dataset.projectTech;

          document.getElementById("project-panel-title").textContent = title || "";

          const imgWrap = document.getElementById("project-panel-image-wrap");
          if (image) {
            const img = document.createElement("img");
            img.src = image;
            img.alt = title;
            img.className = "project-panel-image";
            img.onerror = () => {
              imgWrap.innerHTML = '<div class="project-panel-image-placeholder">Project preview</div>';
            };
            imgWrap.innerHTML = "";
            imgWrap.appendChild(img);
          } else {
            imgWrap.innerHTML = '<div class="project-panel-image-placeholder">Project preview</div>';
          }

          document.getElementById("project-panel-details").textContent = details || short || "";
          document.getElementById("project-panel-tech").textContent = tech ? "Tech: " + tech : "";

          const actions = document.getElementById("project-panel-actions");
          actions.innerHTML = "";
          if (github) {
            const a = document.createElement("a");
            a.href = github;
            a.target = "_blank";
            a.rel = "noopener";
            a.className = "btn btn-primary";
            a.textContent = "View on GitHub";
            actions.appendChild(a);
          }
          if (demo) {
            const a = document.createElement("a");
            a.href = demo;
            a.target = "_blank";
            a.rel = "noopener";
            a.className = "btn";
            a.textContent = "Live Demo";
            actions.appendChild(a);
          }

          overlay.classList.add("is-open");
          overlay.setAttribute("aria-hidden", "false");
          panel.setAttribute("aria-labelledby", "project-panel-title");
          document.body.style.overflow = "hidden";
        };

        const closePanel = () => {
          overlay.classList.remove("is-open");
          overlay.setAttribute("aria-hidden", "true");
          document.body.style.overflow = "";
        };

        cards.forEach((card) => {
          card.addEventListener("click", () => openPanel(card));
        });

        closeBtn.addEventListener("click", closePanel);
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) closePanel();
        });

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && overlay.classList.contains("is-open")) closePanel();
        });
      })();
    </script>
  </body>
</html>
