<!doctype html>
<html lang="{{ site.locale | slice: 0, 2 }}">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>{{ page.title | default: site.title }}</title>
    {% if page.description or site.description %}
      <meta
        name="description"
        content="{{ page.description | default: site.description | strip_html | strip }}"
      />
    {% endif %}

    <link rel="icon" href="{{ '/images/favicon.svg' | relative_url }}" type="image/svg+xml" />
    <link rel="stylesheet" href="{{ '/assets/css/portfolio.css' | relative_url }}" />
  </head>

  <body>
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="#top" aria-label="Back to top">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">{{ site.author.name | default: site.name }}</span>
        </a>

        <nav class="tabs" aria-label="Profile sections">
          <a class="tab" href="#projects">Projects</a>
          <a class="tab" href="#biography">Biography</a>
          <a class="tab" href="#resume">Resume</a>
        </nav>
      </div>
    </header>

    <main class="page-main">{{ content }}</main>

    <footer class="site-footer">
      <div class="footer-inner">
        <span class="muted">Built with Jekyll •</span>
        <span class="muted">© {{ site.time | date: '%Y' }} {{ site.author.name | default: site.name }}</span>
      </div>
    </footer>
  </body>
</html>
